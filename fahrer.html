<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>IVU Fahreranzeige</title>

<meta name="viewport"
content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --bg:#0D1117;
  --panel:#161B22;
  --line:#30363D;
  --blue:#1F6FEB;
  --blue2:#58A6FF;
  --green:#00FF88;
  --orange:#FFB347;
  --red:#FF4444;
}

html,body{
  margin:0;height:100%;width:100%;
  background:var(--bg);color:#fff;
  font-family:Segoe UI,Arial,sans-serif;
  overflow:hidden;touch-action:none;
}

/* HEADER */
.header{
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  background:#161B22;
  border-bottom:2px solid var(--blue);
}
#delay{font-size:1.6rem;font-weight:900}
#headway{font-size:1rem;font-weight:900;color:#ccc}

/* LAYOUT */
.main{
  display:grid;
  grid-template-columns:42% 6px 1fr;
  height:calc(100% - 70px);
}

/* STOPS */
.stops{
  padding:12px;
  overflow-y:auto;
  height:100%;
}
.stop{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px;
  padding:10px;
  border-bottom:1px solid var(--line);
  font-weight:800;
}
.stop.active{background:rgba(31,111,235,.25)}
.stop.done{opacity:.4}

/* DIVIDER */
.divider{background:#222}

/* RIGHT */
.right{
  display:grid;
  grid-template-rows:50% auto auto;
}
#map{width:100%;height:100%}

/* BUTTONS */
.controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:12px;
  background:var(--panel);
  border-top:1px solid var(--line);
}
.btn{
  padding:18px;
  font-weight:900;
  font-size:1.1rem;
  border:none;
  border-radius:18px;
  background:var(--blue);
  color:#000;
}
.btn.ghost{background:#222;color:#fff}

/* ARROW MARKER – KEIN UMRISS */
.arrowMarker{
  width:40px;height:40px;
  transform-origin:50% 50%;
}
.arrowMarker svg{width:40px;height:40px}
</style>
</head>

<body>

<div class="header">
  <div>IVU Fahreranzeige</div>
  <div>
    <div id="delay">+00:00</div>
    <div id="headway">HW --:-- / --:--</div>
  </div>
</div>

<div class="main">
  <div class="stops" id="stopList"></div>
  <div class="divider"></div>

  <div class="right">
    <div id="map"></div>

    <div class="controls">
      <button class="btn" onclick="gpsStart()">📍 GPS</button>
      <button class="btn ghost" onclick="prevStop()">◀</button>
      <button class="btn ghost" onclick="nextStop()">▶</button>
    </div>

    <div class="controls">
      <button class="btn ghost" onclick="centerOnTrack()">🧭 Track</button>
      <button class="btn ghost" onclick="toggleTrack()">🧵 Route</button>
      <button class="btn ghost">🔧</button>
    </div>
  </div>
</div>

<script>
/* ================= DATEN ================= */
const stops=[
  {name:"Depot",lat:52.5208,lon:13.4095,time:"08:00"},
  {name:"Marktplatz",lat:52.5215,lon:13.4112,time:"08:05"},
  {name:"Rathaus",lat:52.5221,lon:13.4128,time:"08:10"},
  {name:"Hbf",lat:52.5231,lon:13.4145,time:"08:15"}
];
const baseTime="08:00";
const sollHeadway=600;

let stopIndex=0;
let currentPos=null;
let lastPos=null;

/* ================= MAP ================= */
const map=L.map("map",{zoomControl:false,dragging:false})
  .setView([52.52,13.41],15);

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  {maxZoom:19}
).addTo(map);

/* ================= TRACK ================= */
const trackCoords=stops.map(s=>[s.lat,s.lon]);
let track=L.polyline(trackCoords,{color:"#00FF88",weight:5}).addTo(map);

/* ================= ARROW ================= */
let arrowMarker=null;

function arrowIcon(angle){
  return L.divIcon({
    html:`
      <div class="arrowMarker" style="transform:rotate(${angle}deg)">
        <svg viewBox="0 0 64 64">
          <!-- KEIN stroke, nur fill -->
          <path d="M32 4 L52 52 L32 44 L12 52 Z" fill="#58A6FF"/>
        </svg>
      </div>`,
    iconSize:[40,40],
    iconAnchor:[20,20]
  });
}

function setArrow(lat,lon,angle){
  if(!arrowMarker){
    arrowMarker=L.marker([lat,lon],{icon:arrowIcon(angle)}).addTo(map);
  }else{
    arrowMarker.setLatLng([lat,lon]);
    arrowMarker.setIcon(arrowIcon(angle));
  }
}

/* ================= BERECHNUNGEN ================= */
function timeToSec(t){
  const [h,m]=t.split(":").map(Number);
  return h*3600+m*60;
}

function bearing(a,b){
  const φ1=a.lat*Math.PI/180;
  const φ2=b.lat*Math.PI/180;
  const Δλ=(b.lon-a.lon)*Math.PI/180;
  const y=Math.sin(Δλ)*Math.cos(φ2);
  const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ================= GPS ================= */
function gpsStart(){
  navigator.geolocation.watchPosition(p=>{
    currentPos={lat:p.coords.latitude,lon:p.coords.longitude};

    let angle=p.coords.heading;
    if((angle==null||angle<0)&&lastPos){
      angle=bearing(lastPos,currentPos);
    }
    if(angle==null) angle=0;

    setArrow(currentPos.lat,currentPos.lon,angle);
    map.setView([currentPos.lat,currentPos.lon],map.getZoom());

    updateDelay();
    updateHeadway();

    lastPos=currentPos;
  },()=>{}, {enableHighAccuracy:true,maximumAge:1000});
}

/* ================= DELAY / HEADWAY ================= */
function getCurrentDelaySec(){
  const plan=timeToSec(stops[stopIndex].time);
  const now=new Date();
  const cur=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  return cur-plan;
}

function updateDelay(){
  const d=getCurrentDelaySec();
  const a=Math.abs(d);
  delay.textContent=`${d>=0?"+":"-"}${String(Math.floor(a/60)).padStart(2,"0")}:${String(a%60).padStart(2,"0")}`;
  delay.style.color=a<60?varGreen():a<180?varOrange():varRed();
}

function updateHeadway(){
  const ist=timeToSec(baseTime)+getCurrentDelaySec();
  const r=ist/sollHeadway;
  headway.textContent=`HW ${Math.floor(ist/60)}:${String(ist%60).padStart(2,"0")} / ${Math.floor(sollHeadway/60)}:00`;
  headway.style.color=r>=1?varGreen():r>=0.7?varOrange():varRed();
}

function varGreen(){return getComputedStyle(document.documentElement).getPropertyValue('--green')}
function varOrange(){return getComputedStyle(document.documentElement).getPropertyValue('--orange')}
function varRed(){return getComputedStyle(document.documentElement).getPropertyValue('--red')}

/* ================= STOPS UI ================= */
function renderStops(){
  stopList.innerHTML="";
  stops.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="stop"+(i===stopIndex?" active":"")+(i<stopIndex?" done":"");
    d.innerHTML=`<div>${s.name}</div><div>${s.time}</div><div>–</div>`;
    stopList.appendChild(d);
  });
}
renderStops();

function nextStop(){if(stopIndex<stops.length-1){stopIndex++;renderStops()}}
function prevStop(){if(stopIndex>0){stopIndex--;renderStops()}}

/* ================= TRACK CONTROLS ================= */
function toggleTrack(){
  if(map.hasLayer(track)) map.removeLayer(track);
  else track.addTo(map);
}
function centerOnTrack(){
  map.fitBounds(track.getBounds(),{padding:[40,40]});
}

/* LIVE TIMER */
setInterval(()=>{updateDelay();updateHeadway()},1000);
</script>

</body>
</html>
