<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPH Fahreranzeige</title>

<meta name="viewport"
content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --bg:#0b0b0b;
  --paper:#f5f5f5;
  --ink:#000;
  --blue:#1F6FEB;
}

/* ===== GLOBAL ===== */
html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  font-family: "Courier New", monospace;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  height:56px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  background:#111;
  color:#fff;
  border-bottom:2px solid var(--blue);
}
#delay{font-size:1.4rem;font-weight:900}

/* ===== LAYOUT ===== */
.main{
  display:grid;
  grid-template-columns:40% 1fr;
  height:calc(100% - 56px);
}

/* ===== FPH PAPIER ===== */
.paper{
  background:var(--paper);
  color:var(--ink);
  overflow:hidden;
  position:relative;
}
.paper-inner{
  position:absolute;
  bottom:0;
  width:100%;
  transition:transform 0.6s ease;
}
.line{
  padding:10px 14px;
  border-bottom:1px dashed #bbb;
  font-size:1.05rem;
}
.line.past{opacity:.4}
.line.current{
  font-weight:900;
  font-size:1.25rem;
}

/* ===== MAP ===== */
.mapWrap{
  display:grid;
  grid-template-rows:50% auto auto;
}
#map{width:100%;height:100%}

/* ===== BUTTONS ===== */
.controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:12px;
  background:#161B22;
}
.btn{
  padding:18px;
  font-weight:900;
  font-size:1.05rem;
  border:none;
  border-radius:16px;
  background:var(--blue);
  color:#000;
}
.btn.ghost{background:#222;color:#fff}

/* ===== PFEIL ===== */
.arrow{
  width:42px;height:42px;
  transform-origin:50% 50%;
}
.arrow svg{width:42px;height:42px}
</style>
</head>

<body>

<div class="header">
  <div>FPH‑DRUCKER</div>
  <div id="delay">+00:00</div>
</div>

<div class="main">

  <!-- FPH Papier -->
  <div class="paper">
    <div class="paper-inner" id="paper"></div>
  </div>

  <!-- Karte -->
  <div class="mapWrap">
    <div id="map"></div>

    <div class="controls">
      <button class="btn" onclick="gpsStart()">📍 GPS</button>
      <button class="btn ghost" onclick="prevStop()">◀</button>
      <button class="btn ghost" onclick="nextStop()">▶</button>
    </div>

    <div class="controls">
      <button class="btn ghost" onclick="centerTrack()">🧭 Track</button>
      <button class="btn ghost" onclick="toggleTrack()">🧵 Route</button>
      <button class="btn ghost">🔧</button>
    </div>
  </div>
</div>

<script>
/* ===== HALTESTELLEN (Demo) ===== */
const stops=[
  {name:"DEPOT",lat:52.5208,lon:13.4095,time:"08:00"},
  {name:"MARKTPLATZ",lat:52.5215,lon:13.4112,time:"08:05"},
  {name:"RATHAUS",lat:52.5221,lon:13.4128,time:"08:10"},
  {name:"HBF",lat:52.5231,lon:13.4145,time:"08:15"}
];
let stopIndex=0;

/* ===== FPH PAPIER ===== */
const paper=document.getElementById("paper");

function renderPaper(){
  paper.innerHTML="";
  stops.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="line"+
      (i<stopIndex?" past":"")+
      (i===stopIndex?" current":"");
    d.textContent=s.name;
    paper.appendChild(d);
  });
  paper.style.transform=`translateY(${-stopIndex*48}px)`;
}
renderPaper();

function nextStop(){
  if(stopIndex<stops.length-1){
    stopIndex++;
    renderPaper();
    updateDelay();
  }
}
function prevStop(){
  if(stopIndex>0){
    stopIndex--;
    renderPaper();
    updateDelay();
  }
}

/* ===== ZEIT / DELAY ===== */
function timeToSec(t){
  const [h,m]=t.split(":").map(Number);
  return h*3600+m*60;
}
function updateDelay(){
  const plan=timeToSec(stops[stopIndex].time);
  const n=new Date();
  const now=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
  const d=now-plan;
  const a=Math.abs(d);
  delay.textContent=`${d>=0?"+":"-"}${String(Math.floor(a/60)).padStart(2,"0")}:${String(a%60).padStart(2,"0")}`;
}
setInterval(updateDelay,1000);

/* ===== MAP ===== */
const map=L.map("map",{zoomControl:false,dragging:false})
  .setView([52.52,13.41],15);

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  {maxZoom:19}
).addTo(map);

/* ===== TRACK ===== */
const track=L.polyline(
  stops.map(s=>[s.lat,s.lon]),
  {color:"#00FF88",weight:5}
).addTo(map);

/* ===== PFEIL ===== */
let arrow=null;
let lastPos=null;

function arrowIcon(angle){
  return L.divIcon({
    html:`
      <div class="arrow" style="transform:rotate(${angle}deg)">
        <svg viewBox="0 0 64 64">
          <path d="M32 4 L52 52 L32 44 L12 52 Z" fill="#58A6FF"/>
        </svg>
      </div>`,
    iconSize:[42,42],
    iconAnchor:[21,21]
  });
}

function bearing(a,b){
  const φ1=a.lat*Math.PI/180;
  const φ2=b.lat*Math.PI/180;
  const Δλ=(b.lon-a.lon)*Math.PI/180;
  const y=Math.sin(Δλ)*Math.cos(φ2);
  const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ===== GPS ===== */
function gpsStart(){
  navigator.geolocation.watchPosition(p=>{
    const pos={lat:p.coords.latitude,lon:p.coords.longitude};
    let angle=p.coords.heading;
    if((angle==null||angle<0)&&lastPos) angle=bearing(lastPos,pos);
    if(angle==null) angle=0;

    if(!arrow){
      arrow=L.marker([pos.lat,pos.lon],{icon:arrowIcon(angle)}).addTo(map);
    }else{
      arrow.setLatLng([pos.lat,pos.lon]);
      arrow.setIcon(arrowIcon(angle));
    }
    map.setView([pos.lat,pos.lon],map.getZoom());
    lastPos=pos;
  },()=>{}, {enableHighAccuracy:true});
}

/* ===== TRACK CONTROLS ===== */
function toggleTrack(){
  if(map.hasLayer(track)) map.removeLayer(track);
  else track.addTo(map);
}
function centerTrack(){
  map.fitBounds(track.getBounds(),{padding:[40,40]});
}
</script>

</body>
</html>
