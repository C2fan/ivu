<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>IVU Fahreranzeige</title>

<meta name="viewport"
content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<!-- Leaflet -->
https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
https://unpkg.com/leaflet@1.9.4/dist/leaflet.jsscript>

<style>
html,body{
  margin:0;height:100%;width:100%;
  background:#0D1117;color:#fff;
  font-family:Segoe UI,Arial;
  overflow:hidden;
  touch-action:none;
}
:root{
  --blue:#1F6FEB;
  --line:#30363D;
  --green:#00FF88;
  --orange:#FFB347;
  --red:#FF4444;
  --funk:#8B0000;
}

/* HEADER */
.header{
  height:72px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  border-bottom:2px solid var(--blue);
  background:#161B22;
}
select{
  background:#0D1117;color:#fff;border:1px solid var(--line);
  padding:6px 10px;border-radius:8px;font-weight:900;
}
#delay{font-size:1.6rem;font-weight:900;text-align:right}
#headway{font-size:1rem;font-weight:900;text-align:right}

/* FUNK BANNER */
#funkBanner{
  display:none;background:var(--funk);color:#fff;
  padding:10px 16px;font-weight:900;letter-spacing:1px;
  border-bottom:2px solid var(--red);
}
#funkTimer{float:right}

/* MAIN GRID */
.main{
  display:grid;
  grid-template-columns: 32% 8px 1fr;
  height:calc(100% - 72px);
}

/* STOPS */
.stops{padding:12px;overflow:hidden}
.stop{
  display:grid;
  grid-template-columns: 1fr auto auto;
  gap:10px;padding:8px;border-bottom:1px solid var(--line);
  font-weight:800;
}
.stop.active{background:rgba(31,111,235,.25)}
.stop.done{opacity:.45}
.time{color:#58A6FF}
.dist{color:#ccc;font-size:.85rem}

/* DIVIDER */
.divider{background:#2a2a2a}

/* RIGHT */
.right{display:grid;grid-template-rows: 1fr 96px}
#map{width:100%;height:100%}

/* CONTROLS */
.controls{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;padding:10px;background:#161B22;border-top:1px solid var(--line);
}
.btn{
  border:none;border-radius:14px;padding:14px;
  font-weight:900;font-size:1.05rem;background:var(--blue);color:#000;
}

/* OVERLAY */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;z-index:9999;
}
#panel{
  width:90%;height:90%;margin:auto;background:#0D1117;
  border-radius:18px;border:2px solid var(--blue);
  display:flex;flex-direction:column;
}
#panel header{
  padding:12px;background:#161B22;font-weight:900;
  display:flex;justify-content:space-between;
}
#panel nav{display:flex;gap:8px;padding:8px}
#panel nav button{
  padding:8px 14px;border-radius:10px;border:none;
  font-weight:900;background:var(--blue);
}
.tab{display:none;flex:1;overflow:auto;padding:12px}
.tab.active{display:block}
</style>
</head>

<body>

<div class="header">
  <select id="tripSelect" onchange="selectTrip(this.value)"></select>
  <div>
    <div id="delay">+00:00</div>
    <div id="headway">HW --:-- / --:--</div>
  </div>
</div>

<div id="funkBanner">
  <span id="funkText">FUNKANWEISUNG</span>
  <span id="funkTimer"></span>
</div>

<div class="main">
  <div class="stops" id="stopList"></div>
  <div class="divider"></div>

  <div class="right">
    <div id="map"></div>
    <div class="controls">
      <button class="btn" onclick="gpsStart()">📍 GPS</button>
      <button class="btn" onclick="prevStop()">◀</button>
      <button class="btn" onclick="nextStop()">▶</button>
      <button class="btn" onclick="openWorkshop()">🔧</button>
    </div>
  </div>
</div>

<!-- WERKSTATT -->
<div id="overlay">
  <div id="panel">
    <header>
      <div>🔧 Werkstatt</div>
      <button onclick="closeWorkshop()">✖</button>
    </header>
    <nav>
      <button onclick="openTab('trips')">Fahrten</button>
      <button onclick="openTab('sonder')">Sonderansagen</button>
      <button onclick="openTab('funk')">📻 Funk‑Dispo</button>
    </nav>

    <div id="tab-trips" class="tab">
      <h3>Fahrt wählen</h3>
      <ul id="wsTrips"></ul>
    </div>

    <div id="tab-sonder" class="tab">
      <h3>Sonderansagen</h3>
      <div id="sonderSlots"></div>
    </div>

    <div id="tab-funk" class="tab">
      <h3>📻 Funk‑Disposition</h3>
      <button onclick="sendFunkText()">📢 Text senden</button>
      <button onclick="sendHold()">⏸️ Halt anweisen</button>
      <button onclick="sendGo()">▶ Weiterfahren</button>
      <button onclick="sendSkip()">⏭ Halt überspringen</button>
      <hr>
      <label>Springe zu Halt:</label>
      <select id="jumpSelect"></select>
      <button onclick="sendJump()">🔁 Setzen</button>
    </div>
  </div>
</div>

<script>
/* ================= DATEN ================= */
const trips=[
{
  line:"Linie 1", sollHeadway:600, baseTime:"08:00",
  name:"Linie 1 → Hbf (08:00)",
  stops:[
    {name:"Depot",lat:52.5208,lon:13.4095,time:"08:00"},
    {name:"Marktplatz",lat:52.5215,lon:13.4112,time:"08:05"},
    {name:"Rathaus",lat:52.5221,lon:13.4128,time:"08:10"},
    {name:"Hbf",lat:52.5231,lon:13.4145,time:"08:15"}
  ]
},
{
  line:"Linie 1", sollHeadway:600, baseTime:"08:10",
  name:"Linie 1 → Hbf (08:10)",
  stops:[
    {name:"Depot",lat:52.5208,lon:13.4095,time:"08:10"},
    {name:"Marktplatz",lat:52.5215,lon:13.4112,time:"08:15"},
    {name:"Rathaus",lat:52.5221,lon:13.4128,time:"08:20"},
    {name:"Hbf",lat:52.5231,lon:13.4145,time:"08:25"}
  ]
}
];

let tripIndex=0, stopIndex=0, currentPos=null;

/* ================= MAP ================= */
const map=L.map("map",{zoomControl:false,dragging:false}).setView([52.52,13.41],16);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
const marker=L.circleMarker([52.52,13.41],{radius:8,color:"#1F6FEB",fillOpacity:1}).addTo(map);

/* ================= INIT ================= */
const tripSelect=document.getElementById("tripSelect");
trips.forEach((t,i)=>{const o=document.createElement("option");o.value=i;o.textContent=t.name;tripSelect.appendChild(o);});
renderStops(); updateDelay(); updateHeadway();

/* ================= GPS ================= */
function gpsStart(){
  navigator.geolocation.watchPosition(p=>{
    currentPos={lat:p.coords.latitude,lon:p.coords.longitude};
    marker.setLatLng([currentPos.lat,currentPos.lon]);
    map.setView([currentPos.lat,currentPos.lon],map.getZoom(),{animate:true});
    renderStops(); updateDelay(); updateHeadway(); autoAdvance();
  },()=>{}, {enableHighAccuracy:true,maximumAge:1000});
}

/* ================= UTILS ================= */
function hav(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function timeToSec(t){const [h,m]=t.split(":").map(Number);return h*3600+m*60}

/* ================= AUTO HALT ================= */
const LEAVE_RADIUS=500; let lastDist=null,lastSwitch=0;
function autoAdvance(){
  const s=trips[tripIndex].stops[stopIndex];
  if(!currentPos||!s) return;
  const d=hav(currentPos,s);
  if(d>LEAVE_RADIUS && lastDist!==null && d>lastDist+20 && Date.now()-lastSwitch>15000){
    if(stopIndex<trips[tripIndex].stops.length-1){
      stopIndex++; lastSwitch=Date.now();
      renderStops(); updateDelay(); updateHeadway();
    }
  }
  lastDist=d;
}

/* ================= STOPS ================= */
function renderStops(){
  stopList.innerHTML="";
  trips[tripIndex].stops.forEach((s,i)=>{
    let dist="–"; if(currentPos) dist=Math.round(hav(currentPos,s))+" m";
    const d=document.createElement("div");
    d.className="stop"+(i===stopIndex?" active":"")+(i<stopIndex?" done":"");
    d.innerHTML=`<div>${s.name}</div><div class="time">${s.time}</div><div class="dist">${dist}</div>`;
    stopList.appendChild(d);
  });
}

/* ================= DELAY ================= */
function getCurrentDelaySec(){
  const plan=timeToSec(trips[tripIndex].stops[stopIndex].time);
  const n=new Date(); const now=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
  return now-plan;
}
function updateDelay(){
  const diff=getCurrentDelaySec(), a=Math.abs(diff);
  delay.textContent=`${diff>=0?"+":"-"}${String(Math.floor(a/60)).padStart(2,"0")}:${String(a%60).padStart(2,"0")}`;
  delay.style.color=a<60?"var(--green)":a<180?"var(--orange)":"var(--red)";
}

/* ================= HEADWAY IST / SOLL ================= */
function updateHeadway(){
  const cur=trips[tripIndex];
  const same=trips.map((t,i)=>({...t,index:i})).filter(t=>t.line===cur.line)
    .sort((a,b)=>timeToSec(a.baseTime)-timeToSec(b.baseTime));
  const pos=same.findIndex(t=>t.index===tripIndex);
  if(pos<=0){headway.textContent="HW --:-- / --:--";return}
  const prev=same[pos-1];
  const ist=(timeToSec(cur.baseTime)+getCurrentDelaySec())-timeToSec(prev.baseTime);
  const soll=cur.sollHeadway;
  headway.textContent=`HW ${String(Math.floor(ist/60)).padStart(2,"0")}:${String(ist%60).padStart(2,"0")} / ${String(Math.floor(soll/60)).padStart(2,"0")}:00`;
  const r=ist/soll;
  headway.style.color=r>=1?"var(--green)":r>=0.7?"var(--orange)":"var(--red)";
}

/* ================= BUTTONS ================= */
function nextStop(){if(!(funk.active&&funk.type==="hold")&&stopIndex<trips[tripIndex].stops.length-1){stopIndex++;renderStops();updateDelay();updateHeadway();}}
function prevStop(){if(stopIndex>0){stopIndex--;renderStops();updateDelay();updateHeadway();}}
function selectTrip(i){tripIndex=+i;stopIndex=0;renderStops();updateDelay();updateHeadway();}

/* ================= WERKSTATT ================= */
function openWorkshop(){const pin=prompt("PIN?"); if(pin==="2580"){overlay.style.display="flex";openTab('trips');renderWsTrips();renderSonder();renderJumpSelect();}}
function closeWorkshop(){overlay.style.display="none"}
function openTab(n){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.getElementById("tab-"+n).classList.add("active");}
function renderWsTrips(){wsTrips.innerHTML="";trips.forEach((t,i)=>{const li=document.createElement("li");li.textContent=t.name;li.onclick=()=>{selectTrip(i);closeWorkshop()};wsTrips.appendChild(li);});}

/* ================= SONDERANSAGEN ================= */
const sonderSlots=[null,null,null,null];
function renderSonder(){
  sonderSlotsDiv=document.getElementById("sonderSlots"); sonderSlotsDiv.innerHTML="";
  sonderSlots.forEach((s,i)=>{
    const d=document.createElement("div");
    d.innerHTML=`Slot ${i+1} <input type="file" accept="audio/*" onchange="uploadSonder(event,${i})">
                 <button onclick="playSonder(${i})">▶</button>`;
    sonderSlotsDiv.appendChild(d);
  });
}
function uploadSonder(e,i){const r=new FileReader();r.onload=()=>sonderSlots[i]=r.result;r.readAsDataURL(e.target.files[0]);}
function playSonder(i){if(sonderSlots[i]) new Audio(sonderSlots[i]).play();}

/* ================= FUNK DISPO ================= */
let funk={active:false,type:null,until:null};
function showFunk(t){funkBanner.style.display="block";funkText.textContent=t;}
function clearFunk(){funkBanner.style.display="none";funkTimer.textContent="";funk={active:false,type:null,until:null};}
function sendFunkText(){const t=prompt("Funkanweisung");if(!t)return;funk.active=true;funk.type="text";showFunk("📢 "+t);}
function sendHold(){const m=prompt("Warten (Min)","2");if(!m)return;funk.active=true;funk.type="hold";funk.until=Date.now()+m*60000;showFunk("⏸️ WARTEN");}
function sendGo(){clearFunk();}
function sendSkip(){clearFunk(); if(stopIndex<trips[tripIndex].stops.length-1){stopIndex++;renderStops();updateDelay();updateHeadway();}}
function renderJumpSelect(){jumpSelect.innerHTML="";trips[tripIndex].stops.forEach((s,i)=>{const o=document.createElement("option");o.value=i;o.textContent=`${i+1}. ${s.name}`;jumpSelect.appendChild(o);});}
function sendJump(){const i=+jumpSelect.value;clearFunk();if(i>=0){stopIndex=i;renderStops();updateDelay();updateHeadway();}}
setInterval(()=>{if(funk.active&&funk.type==="hold"){const r=Math.max(0,Math.floor((funk.until-Date.now())/1000));funkTimer.textContent=`WARTEN ${String(Math.floor(r/60)).padStart(2,"0")}:${String(r%60).padStart(2,"0")}`; if(r<=0) clearFunk();}},1000);
</script>

</body>
</html>
